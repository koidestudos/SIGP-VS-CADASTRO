# Deploy SIGP-VS → Firebase Hosting + Firestore Rules
#
# Secrets obrigatórios em: GitHub → Settings → Secrets and variables → Actions
#
# FIREBASE_SERVICE_ACCOUNT  → JSON completo da conta de serviço (Firebase Console)
# FIREBASE_PROJECT_ID       → ID do projeto Firebase (ex: sigp-vs-cadastro)
# VITE_FIREBASE_API_KEY
# VITE_FIREBASE_AUTH_DOMAIN
# VITE_FIREBASE_PROJECT_ID
# VITE_FIREBASE_STORAGE_BUCKET
# VITE_FIREBASE_MESSAGING_SENDER_ID
# VITE_FIREBASE_APP_ID
#
# Como gerar FIREBASE_SERVICE_ACCOUNT:
# Firebase Console → Configurações → Contas de serviço → Gerar nova chave privada
#
# Papéis IAM obrigatórios na conta de serviço (Google Cloud → IAM):
#   - Firebase Admin                    (deploy geral)
#   - Firebase Rules Admin              (publicar/testar firestore.rules)
#   - Firebase Hosting Admin            (publicar o site)
#   - Service Usage Consumer            (consultar APIs — evita 403 em firestore.googleapis.com)
#
# APIs que devem estar ativas (APIs & Services → Library):
#   - Cloud Firestore API
#   - Firebase Rules API
#   - Service Usage API
#
# Firestore Database deve existir no Firebase Console antes do primeiro deploy.

name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting
        run: npx firebase-tools@latest deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Deploy Firestore Rules
        run: npx firebase-tools@latest deploy --only firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
