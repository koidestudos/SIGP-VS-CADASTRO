# Deploy SIGP-VS → Firebase Hosting + Firestore Rules
#
# Secrets obrigatórios em: GitHub → Settings → Secrets and variables → Actions
#
# FIREBASE_SERVICE_ACCOUNT  → JSON completo da conta de serviço (sem aspas extras)
# FIREBASE_PROJECT_ID       → ID do projeto (ex: sigp-vs) — igual ao project_id do JSON
# VITE_FIREBASE_*
#
# Papéis IAM na MESMA conta cujo e-mail aparece no passo "Verify authentication":
#   - Firebase Admin
#   - Firebase Rules Admin
#   - Firebase Hosting Admin
#   - Service Usage Consumer
#
# Para anexos (Storage): dono do projeto deve ativar Storage no Firebase Console
# (Build → Storage → Começar) ou habilitar firebasestorage.googleapis.com no GCP.

name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify authentication
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          SA=$(python3 -c "import json; print(json.load(open('${GOOGLE_APPLICATION_CREDENTIALS}'))['client_email'])")
          JSON_PROJECT=$(python3 -c "import json; print(json.load(open('${GOOGLE_APPLICATION_CREDENTIALS}'))['project_id'])")
          echo "Conta de serviço do secret: $SA"
          echo "project_id no JSON: $JSON_PROJECT"
          echo "FIREBASE_PROJECT_ID secret: $PROJECT_ID"
          if [ "$JSON_PROJECT" != "$PROJECT_ID" ]; then
            echo "::error::FIREBASE_PROJECT_ID ($PROJECT_ID) difere do project_id no JSON ($JSON_PROJECT)"
            exit 1
          fi
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud config set project "$PROJECT_ID"
          echo "Testando API de Firestore Rules..."
          TOKEN=$(gcloud auth print-access-token)
          HTTP=$(curl -s -o /tmp/rules-test.json -w "%{http_code}" \
            -X POST "https://firebaserules.googleapis.com/v1/projects/${PROJECT_ID}:test" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"source":{"files":[{"name":"firestore.rules","content":"rules_version = \"2\"; service cloud.firestore { match /databases/{db}/documents { match /{document=**} { allow read, write: if false; } } }"}]}}')
          echo "Resposta HTTP da API de Rules: $HTTP"
          cat /tmp/rules-test.json || true
          if [ "$HTTP" != "200" ]; then
            echo "::error::A conta $SA não tem permissão para publicar regras em $PROJECT_ID."
            echo "No IAM, adicione 'Firebase Rules Admin' e 'Firebase Admin' a ESSA conta (não outra)."
            exit 1
          fi

      - name: Deploy Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx firebase-tools@latest deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx firebase-tools@latest deploy --only firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Enable Firebase Storage API (optional)
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          gcloud services enable firebasestorage.googleapis.com \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Deploy Storage Rules
        id: storage_deploy
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx firebase-tools@latest deploy --only storage --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Storage deploy notice
        if: steps.storage_deploy.outcome == 'failure'
        run: |
          echo "::warning::Firebase Storage não foi publicado (anexos não funcionarão até ativar)."
          echo "Dono do projeto: Firebase Console → Build → Storage → Começar"
          echo "Ou habilite a API: https://console.cloud.google.com/apis/library/firebasestorage.googleapis.com?project=${{ secrets.FIREBASE_PROJECT_ID }}"
